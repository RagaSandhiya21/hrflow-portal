# HRFlow CI — QA §10.5 requirement: "GitHub Actions CI pipeline running all
# tests on every push with pass/fail badge on README."
#
# This intentionally stops at test/build/coverage — it does NOT deploy
# anywhere (Azure Static Web Apps deployment is out of scope for this
# workflow; wire that up separately once you're ready to go live).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hrflow_user
          POSTGRES_PASSWORD: hrflow_pass
          POSTGRES_DB: hrflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hrflow_user -d hrflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+psycopg2://hrflow_user:hrflow_pass@localhost:5432/hrflow_test
      JWT_SECRET: ci-test-secret
      USE_MOCK_SSO: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Apply database migrations (Alembic)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://hrflow_user:hrflow_pass@localhost:5432/hrflow_test
        run: alembic upgrade head

      - name: Run backend tests (Pytest + coverage)
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_USE_MOCK_SSO: "true"
        run: npm run build
