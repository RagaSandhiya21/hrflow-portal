[alembic]
script_location = migrations
prepend_sys_path = .

# Timezone-aware, sortable revision filenames (rev_id_slug).
file_template = %%(rev)s_%%(slug)s

# sqlalchemy.url is deliberately left blank here — migrations/env.py pulls
# the real value from app.config.settings.DATABASE_URL at runtime (same
# .env-driven config the app itself uses), so there's exactly one place
# the connection string is configured, not two that can drift out of sync.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
